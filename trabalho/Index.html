<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PScode</title>
    <link rel="icon" type="image/png" href="https://img.freepik.com/vetores-premium/logotipo-do-monitor-loja-digital-logotipo-de-produtos-eletronicos-ou-logotipo-da-loja-logotipo-da-loja_372882-57.jpg">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header id="cabecalho"></header>

<div class="espacamento">
    <footer id="rodape"></footer>
    <table id="tabela"></table>
    <menu id="menu"></menu>
    <form id="formulario"></form>
</div>

<script>
    
fetch('footer.html')
.then(response => response.text())
.then(data => {
    document.getElementById('rodape').innerHTML = data;
});

fetch('menu.html')
.then(response => response.text())
.then(data => {
    document.getElementById('menu').innerHTML = data;
});

fetch('table.html')
.then(response => response.text())
.then(data => {
    document.getElementById('tabela').innerHTML = data;
});

</script>
<script src="script.js"></script>

</body>
</html>
