<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PScode</title>
    <link rel="icon" type="image/png" href="https://img.freepik.com/vetores-premium/logotipo-do-monitor-loja-digital-logotipo-de-produtos-eletronicos-ou-logotipo-da-loja-logotipo-da-loja_372882-57.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu"></div>

    <section id="inicio"></section>

    <section id="produtos">
        <div id="tabela"></div>
    </section>

    <section id="sobre">
        <div class="secao-conteudo">
            <h2>Sobre Nós</h2>
            <p>Somos uma loja especializada em eletrônicos com os melhores produtos do mercado.</p>
        </div>
    </section>

    <section id="servicos">
        <div class="secao-conteudo">
            <h2>Serviços</h2>
            <p>Oferecemos assistência técnica, garantia estendida e suporte ao cliente.</p>
        </div>
    </section>

    <section id="contato">
        <div class="secao-conteudo">
            <h2>Contato</h2>
            <p>Entre em contato conosco pelo e-mail: contato@pscodeshop.com</p>
        </div>
    </section>

    <footer id="rodape"></footer>

    <script>
        fetch('menu.html')
            .then(r => r.text())
            .then(data => {
                document.getElementById('menu').innerHTML = data;
                if (typeof initMenu === 'function') initMenu();
            });

        fetch('Products.json')
            .then(r => r.json())
            .then(products => {
                document.getElementById('tabela').innerHTML = generateTable(products);
                enableDeleteCell();
            });


        fetch('footer.html')
            .then(r => r.text())
            .then(data => document.getElementById('rodape').innerHTML = data);
    </script>
    <script src="script.js"></script>

</body>
</html>
