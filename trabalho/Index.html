<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PScode</title>
    <link rel="icon" type="image/png" href="https://img.freepik.com/vetores-premium/logotipo-do-monitor-loja-digital-logotipo-de-produtos-eletronicos-ou-logotipo-da-loja-logotipo-da-loja_372882-57.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu"></div>

    <div id="tabela"></div>

    <footer id="rodape"></footer>

    <script>
        fetch('menu.html')
            .then(r => r.text())
            .then(data => {
                document.getElementById('menu').innerHTML = data;
                if (typeof initMenu === 'function') initMenu();
            });

        fetch('table.html')
            .then(r => r.text())
            .then(data => document.getElementById('tabela').innerHTML = data);

        fetch('footer.html')
            .then(r => r.text())
            .then(data => document.getElementById('rodape').innerHTML = data);
    </script>
    <script src="script.js"></script>

</body>
</html>
