<body class="loginPage">
    <header id="cabecalho"></header>
    <link rel="stylesheet" href="style.css">
    <menu id="menu"></menu>

    <a href="index.html" class="btn-voltar">← Voltar para o Início</a>

    <div class="cadastramento-zone">
        <div class="login-image">
            <div class="image-overlay">
                <h2>Bem-vindo de volta!</h2>
                <p>Acesse sua conta para continuar comprando.</p>
            </div>
        </div> 
        
        <form action="/enviar-cadastro" method="POST" class="loginForm">
            <h1>Login</h1>
            <p class="subtitle">Insira seus dados abaixo</p>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
            </div>

            <a href="Cadastro.html" class="link-cadastro">Não tenho uma conta</a>
            
            <div class="button-group">
                <button type="submit" id="Login">Entrar</button>
                <button type="reset" id="cancelar">Limpar</button>
            </div>
        </form>
    </div>

    <script>
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                const menuContainer = document.getElementById('menu');
                menuContainer.innerHTML = data;
                
                // Remove o botão de login do menu dinâmico
                const links = menuContainer.querySelectorAll('li');
                links.forEach(li => {
                    if (li.textContent.trim().toLowerCase() === 'login') {
                        li.remove();
                    }
                });
            })
            .catch(err => console.error('Erro carregando menu:', err));
    </script>
</body>
