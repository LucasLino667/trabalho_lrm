<!DOCTYPE html>
<html lang="pt-BR">
<body class="loginPage">
    <header id="cabecalho"></header>
    <link rel="stylesheet" href="style.css">
    <menu id="menu" role="navigation" aria-label="Menu de navegação"></menu>

    

    <div class="cadastramento-zone" aria-label="Área de login">
        <div class="login-image" aria-hidden="true">
            <div class="image-overlay">
                <h2>Bem-vindo de volta!</h2>
                <p>Acesse sua conta para continuar comprando.</p>
            </div>
        </div> 
        
        <form class="loginForm" onsubmit="login(event)" novalidate aria-label="Formulário de login">
            <h1>Login</h1>
            <p class="subtitle" id="login-desc">Insira seus dados abaixo</p>

            <div class="input-group">
                <label for="username">username</label>
                <input type="text" id="username" name="username" placeholder="seu username" required aria-required="true" autocomplete="username">
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required aria-required="true" autocomplete="current-password">
            </div>

            <div class="input-group lembrar-me-group">
                <label for="lembrar-me">Lembrar</label>
                <input type="checkbox" id="lembrar-me" name="lembrar-me" value="true" checked>
            </div>

            <a href="Cadastro.html" class="link-cadastro">Não tenho uma conta</a>
            
            <div class="button-group">
                <button type="submit" id="Login">Entrar</button>
                <button type="reset" id="cancelar">Limpar</button>
            </div>
        </form>
    </div>

    <script>
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                const menuContainer = document.getElementById('menu');
                menuContainer.innerHTML = data;
                
                const links = menuContainer.querySelectorAll('li');
                links.forEach(li => {
                    if (li.textContent.trim().toLowerCase() === 'login') {
                        li.remove();
                    }
                });

                if (typeof initMenu === 'function') initMenu();
            })
            .catch(err => console.error('Erro carregando menu:', err));
    </script>
    <script src="script.js"></script>
</body>
</html>
