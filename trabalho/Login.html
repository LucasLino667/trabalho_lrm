<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS code sign-in</title>
    <link rel="icon" type="image/png" href="https://img.freepik.com/vetores-premium/logotipo-do-monitor-loja-digital-logotipo-de-produtos-eletronicos-ou-logotipo-da-loja-logotipo-da-loja_372882-57.jpg">
</head>

<body class="loginPage">

    <div>
    </div>
    <header id="cabecalho"></header>
    <menu id="menu"></menu>
    <a href="index.html" class="btn-voltar">← Voltar</a>
    <div class="cadastramento-zone">
    <form action="/enviar-cadastro" method="POST" class="loginForm">
        <h1>Login</h1>
        <div class="email-login">
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
        </div>
        <br>
        <div class="senha-login">
            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" required>
        </div>
        <br>
        <a href="Cadastro.html">Não tenho uma conta<a>
        <br>
        <button type="submit" id="Login">Login</button>
        <button type="reset" id="cancelar">Cancelar</button>
    </form>
</div>
   <div>
    </div>

    <script>
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('menu').innerHTML = data;
    
                const loginBtn = document.getElementById('menu-login');
                if (loginBtn) {
                    loginBtn.style.display = 'none';
                }
            })
            .catch(err => console.error('Erro carregando menu:', err));
    </script>
</body>
</html>
